<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promea Dashboard</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-strong: #1749b5;
            --secondary: #14b8a6;
            --background: #f7f8fb;
            --surface: #ffffff;
            --surface-muted: #eef2f7;
            --border: #dce3ee;
            --text: #101828;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
            --radius: 8px;
            --space-1: 4px;
            --space-2: 8px;
            --space-3: 12px;
            --space-4: 16px;
            --space-5: 24px;
            --space-6: 32px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --background: #090d14;
                --surface: #111827;
                --surface-muted: #172033;
                --border: #263244;
                --text: #f8fafc;
                --text-muted: #9aa7ba;
                --shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text);
            background: var(--background);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .shell {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: var(--space-5) 0 var(--space-6);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-4);
            margin-bottom: var(--space-6);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            min-width: 0;
        }

        .brand img {
            width: 36px;
            height: 36px;
        }

        .brand-name {
            display: block;
            font-size: 15px;
            font-weight: 700;
            line-height: 1.1;
        }

        .brand-tagline {
            display: block;
            margin-top: 2px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            min-height: 32px;
            padding: 0 var(--space-3);
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text-muted);
            background: var(--surface);
            font-size: 13px;
            white-space: nowrap;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: var(--success);
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            gap: var(--space-5);
            padding-bottom: var(--space-5);
            border-bottom: 1px solid var(--border);
        }

        h1 {
            margin: 0;
            font-size: clamp(30px, 5vw, 54px);
            line-height: 1;
            letter-spacing: 0;
        }

        .description {
            max-width: 680px;
            margin: var(--space-3) 0 0;
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.6;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(120px, 1fr));
            gap: var(--space-3);
        }

        .meta-item {
            min-width: 140px;
            padding: var(--space-4);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .meta-label {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .meta-value {
            display: block;
            margin-top: var(--space-2);
            font-size: 20px;
            font-weight: 700;
        }

        .section {
            margin-top: var(--space-6);
        }

        .section-heading {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-4);
            margin-bottom: var(--space-4);
        }

        h2 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 0;
        }

        .section-count {
            color: var(--text-muted);
            font-size: 13px;
        }

        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: var(--space-4);
        }

        .card {
            min-height: 144px;
            padding: var(--space-5);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .metric-title {
            margin: 0;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
        }

        .metric-value {
            margin-top: var(--space-4);
            font-size: 34px;
            font-weight: 800;
            line-height: 1;
        }

        .metric-description {
            min-height: 20px;
            margin: var(--space-3) 0 0;
            color: var(--text-muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: var(--space-4);
        }

        .panel {
            padding: var(--space-5);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .panel h3 {
            margin: 0 0 var(--space-4);
            font-size: 15px;
        }

        .chart-frame {
            position: relative;
            height: 300px;
        }

        .table-wrap {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        table {
            width: 100%;
            min-width: 540px;
            border-collapse: collapse;
            background: var(--surface);
        }

        th,
        td {
            padding: 13px 14px;
            border-bottom: 1px solid var(--border);
            text-align: left;
            font-size: 14px;
        }

        th {
            color: var(--text-muted);
            background: var(--surface-muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        .empty {
            padding: var(--space-5);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            color: var(--text-muted);
            background: var(--surface);
        }

        @media (max-width: 760px) {
            .topbar,
            .hero,
            .section-heading {
                align-items: flex-start;
                flex-direction: column;
            }

            .hero {
                display: flex;
            }

            .meta-grid {
                width: 100%;
            }

            .chart-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
<main class="shell">
    <header class="topbar">
        <div class="brand">
            <img src="/assets/logo.svg" alt="Promea logo">
            <div>
                <span class="brand-name">Promea</span>
                <span class="brand-tagline">Professional Metrics Analytics</span>
            </div>
        </div>
        <div class="status">
            <span class="status-dot"></span>
            <span id="refresh-status">Live data</span>
        </div>
    </header>

    <section class="hero">
        <div>
            <h1 id="dashboard-title">Dashboard</h1>
            <p id="dashboard-description" class="description"></p>
        </div>
        <div class="meta-grid" aria-label="Dashboard summary">
            <div class="meta-item">
                <span class="meta-label">Components</span>
                <span id="component-count" class="meta-value">0</span>
            </div>
            <div class="meta-item">
                <span class="meta-label">Refresh</span>
                <span id="refresh-value" class="meta-value">Manual</span>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="section-heading">
            <h2>Metrics</h2>
            <span id="metrics-count" class="section-count"></span>
        </div>
        <div id="metrics" class="metric-grid"></div>
    </section>

    <section class="section">
        <div class="section-heading">
            <h2>Charts</h2>
            <span id="charts-count" class="section-count"></span>
        </div>
        <div id="charts" class="chart-grid"></div>
    </section>

    <section class="section">
        <div class="section-heading">
            <h2>Tables</h2>
            <span id="tables-count" class="section-count"></span>
        </div>
        <div id="tables"></div>
    </section>
</main>

<script>
    const palette = ["#2563eb", "#14b8a6", "#7c3aed", "#f59e0b", "#ef4444", "#10b981"];
    const charts = [];

    async function loadDashboard() {
        const dashboardName = window.location.pathname.split("/").pop();
        const response = await fetch(`/api/dashboard/${encodeURIComponent(dashboardName)}`);

        if (!response.ok) {
            document.querySelector(".shell").innerHTML = '<div class="empty">Dashboard not found.</div>';
            return;
        }

        const dashboard = await response.json();
        renderDashboard(dashboard);
        scheduleRefresh(dashboard);
    }

    function renderDashboard(dashboard) {
        const metrics = dashboard.metrics ?? [];
        const chartDefinitions = dashboard.charts ?? [];
        const tables = dashboard.tables ?? [];
        const refresh = dashboard.metadata?.refreshIntervalSeconds;

        document.title = `${dashboard.name} - Promea`;
        text("dashboard-title", dashboard.name);
        text("dashboard-description", dashboard.metadata?.description ?? "Embedded analytics dashboard powered by Promea.");
        text("component-count", metrics.length + chartDefinitions.length + tables.length);
        text("refresh-value", refresh ? `${refresh}s` : "Manual");
        text("metrics-count", countLabel(metrics.length, "metric"));
        text("charts-count", countLabel(chartDefinitions.length, "chart"));
        text("tables-count", countLabel(tables.length, "table"));

        renderMetrics(metrics);
        renderCharts(chartDefinitions);
        renderTables(tables);
    }

    function scheduleRefresh(dashboard) {
        const refresh = dashboard.metadata?.refreshIntervalSeconds;

        if (!refresh) {
            return;
        }

        window.setTimeout(loadDashboard, refresh * 1000);
        text("refresh-status", `Auto refresh every ${refresh}s`);
    }

    function renderMetrics(metrics) {
        const container = document.getElementById("metrics");

        if (!metrics.length) {
            container.innerHTML = '<div class="empty">No metrics registered.</div>';
            return;
        }

        container.innerHTML = metrics.map(metric => `
            <article class="card">
                <p class="metric-title">${escapeHtml(metric.name)}</p>
                <div class="metric-value">${escapeHtml(formatValue(metric.value))}</div>
                <p class="metric-description">${escapeHtml(metric.description ?? "")}</p>
            </article>
        `).join("");
    }

    function renderCharts(chartDefinitions) {
        const container = document.getElementById("charts");
        charts.forEach(chart => chart.destroy());
        charts.length = 0;

        if (!chartDefinitions.length) {
            container.innerHTML = '<div class="empty">No charts registered.</div>';
            return;
        }

        container.innerHTML = "";

        chartDefinitions.forEach((chart, index) => {
            const wrapper = document.createElement("article");
            wrapper.className = "panel";
            wrapper.innerHTML = `
                <h3>${escapeHtml(chart.name)}</h3>
                <div class="chart-frame">
                    <canvas id="chart-${index}"></canvas>
                </div>
            `;
            container.appendChild(wrapper);

            const labels = Object.keys(chart.data ?? {});
            const values = Object.values(chart.data ?? {});
            const canvas = document.getElementById(`chart-${index}`);
            charts.push(new Chart(canvas, {
                type: chart.type.toLowerCase(),
                data: {
                    labels,
                    datasets: [{
                        label: chart.name,
                        data: values,
                        borderColor: palette[index % palette.length],
                        backgroundColor: labels.map((_, itemIndex) => palette[itemIndex % palette.length] + "33"),
                        borderWidth: 2,
                        tension: 0.35,
                        fill: chart.type.toLowerCase() === "line"
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: { grid: { display: false } },
                        y: { beginAtZero: true, grid: { color: "rgba(148, 163, 184, 0.18)" } }
                    }
                }
            }));
        });
    }

    function renderTables(tables) {
        const container = document.getElementById("tables");

        if (!tables.length) {
            container.innerHTML = '<div class="empty">No tables registered.</div>';
            return;
        }

        container.innerHTML = tables.map(table => {
            const rows = Array.isArray(table.data) ? table.data : [];

            if (!rows.length) {
                return `<article class="panel"><h3>${escapeHtml(table.name)}</h3><div class="empty">No rows.</div></article>`;
            }

            const columns = Object.keys(rows[0]);
            return `
                <article class="panel">
                    <h3>${escapeHtml(table.name)}</h3>
                    <div class="table-wrap">
                        <table>
                            <thead>
                                <tr>${columns.map(column => `<th>${escapeHtml(column)}</th>`).join("")}</tr>
                            </thead>
                            <tbody>
                                ${rows.map(row => `
                                    <tr>${columns.map(column => `<td>${escapeHtml(formatValue(row[column]))}</td>`).join("")}</tr>
                                `).join("")}
                            </tbody>
                        </table>
                    </div>
                </article>
            `;
        }).join("");
    }

    function countLabel(value, noun) {
        return `${value} ${noun}${value === 1 ? "" : "s"}`;
    }

    function formatValue(value) {
        if (value === null || value === undefined) {
            return "";
        }

        if (typeof value === "object") {
            return JSON.stringify(value);
        }

        return String(value);
    }

    function text(id, value) {
        document.getElementById(id).textContent = value;
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#039;");
    }

    loadDashboard();
</script>
</body>

</html>
